# Binary Size Tracker Configuration
#
# This file defines which contracts to track for binary size regression.
# Each contract should be a simple smart contract that represents different
# complexity levels and common patterns.
#
# For execution cost tracking, you can optionally specify test_inputs:
#   - test_case_name: A descriptive name for the test case
#   - inputs_hex: List of hex-encoded CBOR data for the validator parameters
#
# Multiple test cases can be specified per contract to track different scenarios

contracts:
  - name: "assert_sum"
    path: "examples/smart_contracts/assert_sum.py"
    description: "Simple spending validator with assertion"
    test_inputs:
      - test_case_name: "valid_sum"
        inputs_hex:
          - ""

  - name: "liquidity_pool"
    path: "examples/smart_contracts/liquidity_pool.py"
    description: "Simple DEX pool"

  - name: "marketplace"
    path: "examples/smart_contracts/marketplace.py"
    description: "Marketplace contract with complex data structures"
    
  - name: "gift"
    path: "examples/smart_contracts/gift.py"
    description: "Gift contract with simple logic"
    test_inputs:
      - test_case_name: "valid_withdrawal"
        inputs_hex:
          - ""  # context

  - name: "wrapped_token"
    path: "examples/smart_contracts/wrapped_token.py"
    purpose: "spending"
    description: "Dual-use contract to generate a wrapped token"
    extra_flags: ["--parameters", "3"]

  - name: "micropayments"
    path: "examples/smart_contracts/micropayments.py"
    description: "Channel for fee-less micropayments"

  - name: "pool_validator"
    path: "examples/smart_contracts/pool_validator.py"
    description: "UPLC benchmark DEX pool validator"
    eval_recursion_limit: 8000
    test_inputs:
      - test_case_name: "swap_a_for_b"
        inputs_hex:
          - ""
      - test_case_name: "swap_b_for_a"
        inputs_hex:
          - ""
      - test_case_name: "deposit"
        inputs_hex:
          - ""
      - test_case_name: "withdraw"
        inputs_hex:
          - ""

  - name: "lp_minting_policy"
    path: "examples/smart_contracts/lp_minting_policy.py"
    description: "UPLC benchmark LP minting policy"
    extra_flags: ["--parameters", "1"]
    test_inputs:
      - test_case_name: "mint_one_nft"
        inputs_hex:
          - "581cee155ace9c40292074cb6aff8c9ccdd273c81648ff1149ef36bcea6e"
          - ""
      - test_case_name: "mint_two_nfts"
        inputs_hex:
          - "581cee155ace9c40292074cb6aff8c9ccdd273c81648ff1149ef36bcea6e"
          - ""

  - name: "nft_marketplace_validator"
    path: "examples/smart_contracts/nft_marketplace_validator.py"
    description: "UPLC benchmark NFT marketplace validator"
    test_inputs:
      - test_case_name: "buy_one"
        inputs_hex:
          - ""
      - test_case_name: "cancel_one"
        inputs_hex:
          - ""

  - name: "nft_minting_policy"
    path: "examples/smart_contracts/nft_minting_policy.py"
    description: "UPLC benchmark NFT minting policy"
    test_inputs:
      - test_case_name: "valid_mint"
        inputs_hex:
          - ""

# Optimization levels to test
optimization_levels: ["O0", "O1", "O2", "O3"]
ignore_warnings: ["O0", "O1"]

# Thresholds for reporting (percentages)
thresholds:
  warning: 5.0     # Warn if size changes by more than 5%
  significant: 10.0 # Mark as significant if size changes by more than 10%
